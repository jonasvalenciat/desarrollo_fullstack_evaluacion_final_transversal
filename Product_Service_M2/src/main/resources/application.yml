spring:
  application:
    name: product-service

  datasource:
    url: jdbc:h2:mem:products_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false

server:
  port: 8082

logging:
  level:
    cl.duoc.fullstack.product_service: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
