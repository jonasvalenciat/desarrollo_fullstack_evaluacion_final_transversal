spring:
  application:
    name: gateway-service

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=2
        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/cart/**
          filters:
            - StripPrefix=2
        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=2
        - id: inventory-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=2
        - id: review-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/reviews/**
          filters:
            - StripPrefix=2
        - id: notification-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2
        - id: category-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/categories/**
          filters:
            - StripPrefix=2
server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

---
spring:
  config:
    activate:
      on-profile: render
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=2
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/v1/cart/**
          filters:
            - StripPrefix=2
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=2
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=2
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/v1/reviews/**
          filters:
            - StripPrefix=2
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2
        - id: category-service
          uri: lb://category-service
          predicates:
            - Path=/api/v1/categories/**
          filters:
            - StripPrefix=2
server:
  port: ${PORT:8080}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
