services:
  # ============================================
  # 1. Discovery Server (Eureka) — Puerto 8761
  # ============================================
  - type: web
    name: discovery-server-m12
    runtime: java
    rootDir: Discovery_Server_M12
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/*.jar --spring.profiles.active=render
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: PORT
        value: 8761

  # ============================================
  # 2. User Service M1 — Puerto 8081
  # ============================================
  - type: web
    name: user-service-m1
    runtime: java
    rootDir: User_Service_M1
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/*.jar --spring.profiles.active=render
    plan: free
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: PORT
        value: 8081
      - key: EUREKA_URI
        fromService:
          name: discovery-server-m12
          type: web
          property: host
        # Se construye como: http://{host}:8761/eureka
      - key: DATABASE_URL
        fromDatabase:
          name: videogames-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: videogames-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: videogames-db
          property: password
    dependsOn:
      - discovery-server-m12

